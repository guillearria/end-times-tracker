name: pipeline

# Manual-only. This optional path runs the paid four-layer model pipeline and SPENDS API CREDITS
# (needs ANTHROPIC_API_KEY in Actions secrets). The daily cron is intentionally removed — recurring
# curation now happens via Claude Code on a Max subscription (.claude/commands/refresh-threats.md,
# scripts/author_threat.py), at $0 API. Re-add a `schedule:` trigger only if you fund the API.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pipeline
  cancel-in-progress: false # never interrupt a run mid-write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog projection is complete
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.run
      - name: Validate before commit (hard gate)
        run: python scripts/validate_data.py
      - name: Commit results
        run: |
          git config user.name "end-times-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ frontend/data/ CHANGELOG.md
          git diff --cached --quiet || git commit -m "pipeline run $(date -u +%FT%TZ)"
          git push
